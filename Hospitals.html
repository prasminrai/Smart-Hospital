<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Hospitals</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

.main{
    display:flex;
}

.sidebar{
    width:200px;
    height:100vh;
    background-color:skyblue;
    color:white;
    padding-top:20px;
    position:fixed;
}

.sidebar h2{
    text-align:center;
}

.sidebar ul{
    list-style:none;
    padding:0;
}

.sidebar ul li{
    padding:15px;
    text-align:center;
}

.sidebar ul li a{
    color:white;
    text-decoration:none;
    display:block;
}

.sidebar ul li:hover{
    background:grey;
}

.content{
    margin-left:220px;
    padding:20px;
}

.header{
    background:lightskyblue;
    color:white;
    padding:15px;
    text-align:center;
    position:relative;
}

.menu-btn{
    position:absolute;
    left:15px;
    top:15px;
    font-size:25px;
    cursor:pointer;
}

.search{
    text-align:center;
    margin:20px;
}

.search input{
    padding:10px;
    width:300px;
    border-radius:20px;
    border:1px solid gray;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:300px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0px 3px 10px rgba(0,0,0,0.2);
    transition:0.4s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.info h2{
    color:#0077cc;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#0077cc;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#005fa3;
}

@media(max-width:768px){

.sidebar{
    width:0;
    overflow:hidden;
    transition:0.3s;
}

.sidebar.active{
    width:200px;
}

.content{
    margin-left:0;
}

.search input{
    width:90%;
}

}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<h2>APPY</h2>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="Maps.html">Maps</a></li>
<li><a href="Hospitals.html">Hospitals</a></li>
<li><a href="Doctor list .html">Doctor List</a></li>
<li><a href="Emergency number.html">Emergency Number</a></li>
</ul>

</div>

<div class="content">

<div class="header">
<span class="menu-btn"
onclick="toggleMenu()">☰</span>

<h1>Hospital Directory</h1>

</div>

<div class="search">
<input type="text"
id="searchBox"
placeholder="Search hospital..."
onkeyup="searchHospital()">
</div>

<div class="container"
id="hospitalContainer">

</div>

</div>

<script>

function toggleMenu(){
document.getElementById("sidebar")
.classList.toggle("active");
}

const hospitals=[

{
name:"Bir Hospital",
location:"Kathmandu",
services:"Emergency, Surgery, ICU",
website:"https://birhospital.gov.np/",
image:"https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0"
},

{
name:"T.U Teaching Hospital",
location:"Maharajgunj",
services:"Medical Education, Emergency",
website:"https://iom.edu.np/",
image:"https://images.unsplash.com/photo-1586773860418-d37222d8fce3"
},

{
name:"Norvic International Hospital",
location:"Kathmandu",
services:"Cardiology, Orthopedics",
website:"https://norvichospital.com/",
image:"https://images.unsplash.com/photo-1538108149393-fbbd81895907"
},

{
name:"Grande International Hospital",
location:"Tokha",
services:"Neurology, Pediatrics",
website:"https://grandehospital.com/",
image:"https://images.unsplash.com/photo-1516549655169-df83a0774514"
},

{
name:"Nepal Mediciti Hospital",
location:"Lalitpur",
services:"Multi-speciality, ICU",
website:"https://nepalmediciti.com/",
image:"https://images.unsplash.com/photo-1576091160550-2173dba999ef"
},

{
name:"Patan Hospital",
location:"Lagankhel",
services:"General Medicine",
website:"http://www.patanhospital.gov.np/",
image:"https://images.unsplash.com/photo-1551076805-e1869033e561"
},

{
name:"Om Hospital",
location:"Chabahil",
services:"Surgery, ICU",
website:"https://omhospitalnepal.com/",
image:"https://images.unsplash.com/photo-1505751172876-fa1923c5c528"
},

{
name:"HAMS Hospital",
location:"Mandikhatar",
services:"Emergency, ICU",
website:"https://hamshospital.com/",
image:"https://images.unsplash.com/photo-1587351021759-3e566b6af7cc"
}

];

displayHospital();

function displayHospital(){

let data="";

hospitals.forEach(h=>{

data+=`

<div class="card">

<img src="${h.image}">

<div class="info">

<h2>${h.name}</h2>

<p><b>Location:</b>
${h.location}</p>

<p><b>Services:</b>
${h.services}</p>

<a href="${h.website}"
target="_blank">

<button>
Visit Website
</button>

</a>

</div>

</div>

`;

});

document.getElementById(
"hospitalContainer"
).innerHTML=data;

}

function searchHospital(){

let input=
document.getElementById(
"searchBox"
).value.toLowerCase();

let cards=
document.querySelectorAll(
".card"
);

cards.forEach(card=>{

let title=
card.querySelector("h2")
.innerText.toLowerCase();

if(title.includes(input)){
card.style.display="block";
}
else{
card.style.display="none";
}

});

}

</script>

</body>
</html>
