<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Beds</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef3f8;
}



.sidebar{
    width:220px;
    height:100vh;
    color:white;
    position:fixed;
    padding-top:20px;

    background:
    linear-gradient(rgba(0,0,0,0.6),
    rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d");

    background-size:cover;
    background-position:center;
}

.sidebar h2{
    text-align:center;
    font-size:28px;
    margin-bottom:30px;
}

.sidebar ul{
    list-style:none;
    padding:0;
}

.sidebar ul li{
    padding:15px;
    text-align:center;
    transition:0.3s;
}

.sidebar ul li a{
    text-decoration:none;
    color:white;
    display:block;
    font-size:17px;
}

.sidebar ul li:hover{
    background:rgba(255,255,255,0.3);
}



.content{
    margin-left:240px;
    padding:20px;
}



.header{

    background:
    linear-gradient(rgba(0,0,0,0.5),
    rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1538108149393-fbbd81895907");

    background-size:cover;
    background-position:center;

    color:white;
    text-align:center;
    padding:60px;
    border-radius:15px;

    position:relative;

    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.header h1{
    font-size:40px;
    margin-bottom:10px;
}

.header p{
    font-size:18px;
}

.menu-btn{
    display:none;
    position:absolute;
    left:15px;
    top:15px;
    font-size:28px;
    cursor:pointer;
}



ol{
    margin-top:25px;
}

ol li{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:15px;
    list-style:none;

    display:flex;
    justify-content:space-between;
    align-items:center;

    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition:0.4s;
}

ol li:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.info{
    flex:1;
}

.info b{
    font-size:18px;
    color:#1d3557;
}

.info p{
    color:#555;
    margin:4px 0;
}

.status{
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
    color:white;
}

.available{
    background:green;
}

.full{
    background:red;
}



@media(max-width:768px){

    .sidebar{
        left:-220px;
        width:220px;
        z-index:1000;
    }

    .sidebar.active{
        left:0;
    }

    .content{
        margin-left:0;
    }

    .menu-btn{
        display:block;
        position:absolute;
        left:15px;
        top:15px;
        font-size:28px;
        cursor:pointer;
        z-index:1100;
    }
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">
<h2>APPY</h2>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="Maps.html">Maps</a></li>
<li><a href="Hospitals.html">Hospitals</a></li>
<li><a href="beds.html">Beds</a></li>
<li><a href="Emergency number.html">Emergency Number</a></li>
</ul>
</div>


<div class="content">

<div class="header">
<span class="menu-btn" onclick="toggleMenu()">☰</span>
<h1>🛏 Hospital Bed Availability</h1>
<p>Check total and available beds</p>
</div>

<ol id="bedContainer"></ol>

</div>

<script>

function toggleMenu(){
document.getElementById("sidebar")
.classList.toggle("active");
}

async function getBeds(){
return [
{ hospital:"Bir Hospital",            totalBeds:500, bookedBeds:420 },
{ hospital:"T.U Teaching Hospital",   totalBeds:700, bookedBeds:690 },
{ hospital:"Norvic International Hospital", totalBeds:300, bookedBeds:220 },
{ hospital:"Grande International Hospital", totalBeds:250, bookedBeds:250 },
{ hospital:"Nepal Mediciti Hospital", totalBeds:450, bookedBeds:380 },
{ hospital:"Patan Hospital",          totalBeds:350, bookedBeds:290 },
{ hospital:"Om Hospital",             totalBeds:180, bookedBeds:140 },
{ hospital:"HAMS Hospital",           totalBeds:220, bookedBeds:220 }
];
}

async function displayBeds(){
let hospitals = await getBeds();
let data = "";

hospitals.forEach(h => {
    let available = h.totalBeds - h.bookedBeds;
    let status = available > 0 ? "Available" : "Full";
    let color  = available > 0 ? "available" : "full";

    data += `
    <li>
      <div class="info">
        <b>${h.hospital}</b>
        <p>Total Beds: ${h.totalBeds}</p>
        <p>Booked Beds: ${h.bookedBeds}</p>
        <p>Available Beds: ${available}</p>
      </div>
      <div class="status ${color}">${status}</div>
    </li>
    `;
});

document.getElementById("bedContainer").innerHTML = data;
}

displayBeds();

</script>

</body>
</html>
