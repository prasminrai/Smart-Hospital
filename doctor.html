<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#eef3f8,#f7fbff);
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#1d3557;
}

#doctorContainer{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
border:3px solid #00aaff;
transition:.3s;
}

.card img:hover{
transform:scale(1.1);
}

.card h2{
margin:10px 0;
color:#1d3557;
}

.card p{
margin:4px 0;
color:#555;
}

.badge{
padding:5px 10px;
background:linear-gradient(45deg,#0077cc,#00aaff);
color:white;
border-radius:20px;
font-size:12px;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#0077cc,#00aaff);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:linear-gradient(45deg,#005fa3,#0077cc);
}


@media(max-width:768px){

    .sidebar{
        left:-220px;   
        width:220px;
        z-index:1000;
    }

.popup-content{
background:white;
padding:25px;
width:90%;
max-width:500px;
border-radius:15px;
position:relative;
animation:show .4s;
}

@keyframes show{
from{
transform:scale(.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:25px;
cursor:pointer;
}

.popup img{
width:120px;
height:120px;
border-radius:50%;
display:block;
margin:auto;
margin-bottom:15px;
border:3px solid #00aaff;
}

.verify{
background:#28a745;
padding:8px;
border-radius:10px;
color:white;
margin-top:10px;
text-align:center;
}

</style>
</head>

const params=new URLSearchParams(window.location.search);

const hospital=params.get("hospital");

document.getElementById("title").innerText=
hospital+" Doctors";

let data="";

doctors[hospital].forEach((doc,index)=>{

data+=`

<div class="card">

<img src="${doc.img}"
onclick="showDoctor(${index})">

<h2>${doc.name}</h2>

<p>${doc.specialist}</p>

<p>${doc.available}</p>

<span class="badge">${hospital}</span>

<br>

<button>Book Appointment</button>

</div>

`;

});

document.getElementById(
"doctorContainer"
).innerHTML=data;


function showDoctor(index){

let doc=doctors[hospital][index];

document.getElementById(
"popupData"
).innerHTML=`

<img src="${doc.img}">

<h2>${doc.name}</h2>

<p><b>Specialist:</b>
${doc.specialist}</p>

<p><b>Education:</b>
${doc.education}</p>

<p><b>Qualification:</b>
${doc.qualification}</p>

<p><b>Achievement:</b>
${doc.achievement}</p>

<p><b>Working Experience:</b>
${doc.working}</p>

<p><b>Available:</b>
${doc.available}</p>

<div class="verify">

✔ Verified Doctor <br>

License ID:
${doc.license}

</div>

`;

document.getElementById(
"popup"
).style.display="flex";

}


function closePopup(){

document.getElementById(
"popup"
).style.display="none";

}
