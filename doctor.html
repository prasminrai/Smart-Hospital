<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctors</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#eef3f8,#f7fbff);
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#1d3557;
}

#doctorContainer{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
border:3px solid #00aaff;
transition:.3s;
}

.card img:hover{
transform:scale(1.1);
}

.card h2{
margin:10px 0;
color:#1d3557;
}

.card p{
margin:4px 0;
color:#555;
}

.badge{
padding:5px 10px;
background:linear-gradient(45deg,#0077cc,#00aaff);
color:white;
border-radius:20px;
font-size:12px;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#0077cc,#00aaff);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
background:linear-gradient(45deg,#005fa3,#0077cc);
}


@media(max-width:768px){

    .sidebar{
        left:-220px;   
        width:220px;
        z-index:1000;
    }

.popup-content{
background:white;
padding:25px;
width:90%;
max-width:500px;
border-radius:15px;
position:relative;
animation:show .4s;
}

@keyframes show{
from{
transform:scale(.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:25px;
cursor:pointer;
}

.popup img{
width:120px;
height:120px;
border-radius:50%;
display:block;
margin:auto;
margin-bottom:15px;
border:3px solid #00aaff;
}

.verify{
background:#28a745;
padding:8px;
border-radius:10px;
color:white;
margin-top:10px;
text-align:center;
}

</style>
</head>
<body>

<h1 id="title"></h1>

<div id="doctorContainer"></div>

<div class="popup" id="popup">

<div class="popup-content">

<span class="close" onclick="closePopup()">×</span>

<div id="popupData"></div>

</div>

</div>

<script>

const doctors={

"Bir Hospital":[
{name:"Dr. Ram Sharma",specialist:"Cardiologist",exp:"12 Years",available:"9AM - 2PM",img:"https://randomuser.me/api/portraits/men/32.jpg"},
{name:"Dr. Sita Rai",specialist:"Neurologist",exp:"8 Years",available:"11AM - 4PM",img:"https://randomuser.me/api/portraits/women/44.jpg"},
{name:"Dr. Anil KC",specialist:"General Physician",exp:"5 Years",available:"10AM - 3PM",img:"https://randomuser.me/api/portraits/men/65.jpg"}
],


"T.U Teaching Hospital":[
{name:"Dr. Arun Rai",specialist:"Cardiologist",exp:"9 Years",available:"9AM-2PM",img:"https://randomuser.me/api/portraits/men/81.jpg",education:"MBBS, MD",qualification:"TU",achievement:"Research Award",working:"9 Years",license:"NMC-2001"},
{name:"Dr. Pooja Lama",specialist:"Neurologist",exp:"10 Years",available:"11AM-5PM",img:"https://randomuser.me/api/portraits/women/30.jpg",education:"MBBS, DM",qualification:"KU",achievement:"Neuro Excellence",working:"10 Years",license:"NMC-2002"},
{name:"Dr. Raj Sharma",specialist:"Dermatologist",exp:"6 Years",available:"9AM-1PM",img:"https://randomuser.me/api/portraits/men/22.jpg",education:"MBBS, MD",qualification:"TU",achievement:"Skin Specialist Award",working:"6 Years",license:"NMC-2003"},
{name:"Dr. Suman Thapa",specialist:"Orthopedic",exp:"12 Years",available:"10AM-4PM",img:"https://randomuser.me/api/portraits/men/42.jpg",education:"MBBS, MS",qualification:"KU",achievement:"Orthopedic Excellence",working:"12 Years",license:"NMC-2004"},
{name:"Dr. Rita Gurung",specialist:"Pediatrician",exp:"8 Years",available:"1PM-6PM",img:"https://randomuser.me/api/portraits/women/27.jpg",education:"MBBS, MD",qualification:"TU",achievement:"Best Child Care",working:"8 Years",license:"NMC-2005"},
{name:"Dr. Milan Rai",specialist:"Surgeon",exp:"15 Years",available:"On Call",img:"https://randomuser.me/api/portraits/men/24.jpg",education:"MBBS, MS",qualification:"KU",achievement:"Top Surgeon",working:"15 Years",license:"NMC-2006"},
{name:"Dr. Sagar KC",specialist:"Cardiology",exp:"11 Years",available:"9AM-3PM",img:"https://randomuser.me/api/portraits/men/61.jpg",education:"MBBS",qualification:"TU",achievement:"Heart Research",working:"11 Years",license:"NMC-2007"},
{name:"Dr. Anita Rai",specialist:"Gynecology",exp:"8 Years",available:"12PM-4PM",img:"https://randomuser.me/api/portraits/women/55.jpg",education:"MBBS, MD",qualification:"KU",achievement:"Women's Health Award",working:"8 Years",license:"NMC-2008"},
{name:"Dr. Binod Karki",specialist:"General Physician",exp:"5 Years",available:"9AM-2PM",img:"https://randomuser.me/api/portraits/men/75.jpg",education:"MBBS",qualification:"TU",achievement:"Best Care Award",working:"5 Years",license:"NMC-2009"},
{name:"Dr. Nisha Shrestha",specialist:"ENT",exp:"7 Years",available:"11AM-3PM",img:"https://randomuser.me/api/portraits/women/71.jpg",education:"MBBS",qualification:"KU",achievement:"ENT Excellence",working:"7 Years",license:"NMC-2010"}
]

};


const params=new URLSearchParams(window.location.search);

const hospital=params.get("hospital");

document.getElementById("title").innerText=
hospital+" Doctors";

let data="";

doctors[hospital].forEach((doc,index)=>{

data+=`

<div class="card">

<img src="${doc.img}"
onclick="showDoctor(${index})">

<h2>${doc.name}</h2>

<p>${doc.specialist}</p>

<p>${doc.available}</p>

<span class="badge">${hospital}</span>

<br>

<button>Book Appointment</button>

</div>

`;

});

document.getElementById(
"doctorContainer"
).innerHTML=data;


function showDoctor(index){

let doc=doctors[hospital][index];

document.getElementById(
"popupData"
).innerHTML=`

<img src="${doc.img}">

<h2>${doc.name}</h2>

<p><b>Specialist:</b>
${doc.specialist}</p>

<p><b>Education:</b>
${doc.education}</p>

<p><b>Qualification:</b>
${doc.qualification}</p>

<p><b>Achievement:</b>
${doc.achievement}</p>

<p><b>Working Experience:</b>
${doc.working}</p>

<p><b>Available:</b>
${doc.available}</p>

<div class="verify">

✔ Verified Doctor <br>

License ID:
${doc.license}

</div>

`;

document.getElementById(
"popup"
).style.display="flex";

}


function closePopup(){

document.getElementById(
"popup"
).style.display="none";

}

</script>

</body>
</html>
