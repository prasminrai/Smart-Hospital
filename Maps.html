<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Hospitals - Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef3f8;
}



.sidebar{
    width:220px;
    height:100vh;
    color:white;
    position:fixed;
    padding-top:20px;

    background:
    linear-gradient(rgba(0,0,0,0.6),
    rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d");

    background-size:cover;
    background-position:center;
}

.sidebar h2{
    text-align:center;
    font-size:28px;
    margin-bottom:30px;
}

.sidebar ul{
    list-style:none;
    padding:0;
}

.sidebar ul li{
    padding:15px;
    text-align:center;
    transition:0.3s;
}

.sidebar ul li a{
    text-decoration:none;
    color:white;
    display:block;
    font-size:17px;
}

.sidebar ul li:hover{
    background:rgba(255,255,255,0.3);
}



.content{
    margin-left:240px;
    padding:20px;
}



.header{

    background:
    linear-gradient(rgba(0,0,0,0.5),
    rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1538108149393-fbbd81895907");

    background-size:cover;
    background-position:center;

    color:white;
    text-align:center;
    padding:60px;
    border-radius:15px;

    position:relative;

    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.header h1{
    font-size:40px;
    margin-bottom:10px;
}

.header p{
    font-size:18px;
}

.menu-btn{
    display:none;
    position:absolute;
    left:15px;
    top:15px;
    font-size:28px;
    cursor:pointer;
}



.map-section{
    margin-top:30px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.map-section h2{
    color:#0077cc;
    margin-bottom:15px;
}

#map{
height:600px;
width:100%;
border-radius:12px;
}

v 
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:999;
}



@media(max-width:768px){

    .sidebar{
        left:-220px;
        width:220px;
        z-index:1000;
    }

    .sidebar.active{
        left:0;
    }

    .content{
        margin-left:0;
    }

    .menu-btn{
        display:block;
        position:absolute;
        left:15px;
        top:15px;
        font-size:28px;
        cursor:pointer;
        z-index:1100;
    }

    .leaflet-top,
    .leaflet-bottom{
        z-index:500 !important;
    }
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<h2>APPY</h2>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="Maps.html">Maps</a></li>
<li><a href="Hospitals.html">Hospitals</a></li>
<li><a href="beds.html">Beds</a></li>
<li><a href="Emergency number.html">Emergency Number</a></li>
</ul>

</div>


<div class="content">

<div class="header">

<span class="menu-btn" onclick="toggleMenu()">☰</span>

<h1>🗺️ Hospital Map</h1>

<p>Locate hospitals on an interactive map and find nearby places.</p>

</div>


<div class="map-section">

<h2>Nearby Hospitals</h2>

<div id="map"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

function toggleMenu(){
document.getElementById("sidebar")
.classList.toggle("active");
}


var map = L.map('map').setView([27.6955, 85.3442], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution:'© OpenStreetMap contributors'
}).addTo(map);


var hospitals = [
{ name:"Bir Hospital", lat:27.7050, lng:85.3150 },
{ name:"T.U Teaching Hospital", lat:27.7344, lng:85.3300 },
{ name:"Norvic Hospital", lat:27.7000, lng:85.3125 },
{ name:"Grande Hospital", lat:27.7390, lng:85.3110 }
];

hospitals.forEach(h => {
L.marker([h.lat, h.lng])
.addTo(map)
.bindPopup("🏥 " + h.name);
});

</script>

</body>
</html>
