<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Hospitals Map</title>


<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* Sidebar (optional if you use it elsewhere) */
.sidebar{
    width:200px;
    height:100vh;
    background-color:skyblue;
    color:white;
    padding-top:20px;
    position:fixed;
}

.content{
    margin-left:200px;
}

/* MAP */
#map{
    height:100vh;
    width:100%;
}

/* Popup button */
button{
    background:#0077cc;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#005fa3;
}

</style>

</head>

<body>

<div id="map"></div>

<script>

window.onload = function () {

    // 🗺️ Center on Kathmandu
    var map = L.map('map').setView([27.7172, 85.3240], 13);

    // 🌍 Map layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution:'© OpenStreetMap contributors'
    }).addTo(map);

    // 🏥 Hospitals in Kathmandu
    const hospitals = [
        {name:"Bir Hospital", lat:27.7025, lng:85.3303},
        {name:"T.U Teaching Hospital", lat:27.7346, lng:85.3356},
        {name:"Norvic International Hospital", lat:27.6910, lng:85.3140},
        {name:"Grande International Hospital", lat:27.7480, lng:85.3280},
        {name:"Nepal Mediciti Hospital", lat:27.6735, lng:85.3235},
        {name:"Patan Hospital", lat:27.6735, lng:85.3235},
        {name:"Om Hospital", lat:27.7350, lng:85.3420},
        {name:"HAMS Hospital", lat:27.7500, lng:85.3450}
    ];

    // 📍 Open Google Maps Route
    function openRoute(lat,lng){
        window.open(
            `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`,
            "_blank"
        );
    }

    // 📌 Add markers
    hospitals.forEach(h => {

        let marker = L.marker([h.lat, h.lng]).addTo(map);

        marker.bindPopup(`
            <b>${h.name}</b><br><br>
            <button onclick="openRoute(${h.lat},${h.lng})">
                Get Directions
            </button>
        `);

        // Click marker → go to hospital list page
        marker.on("click", function () {
            window.location.href =
            "Hospitals.html?hospital=" + encodeURIComponent(h.name);
        });

    });

};

</script>

</body>
</html>
