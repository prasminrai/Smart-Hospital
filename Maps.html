<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart hospitals</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
        }

        .sidebar{
            width:200px;
            height:100vh;
            background-color:skyblue;
            color:white;
            padding-top:20px;
            position:fixed;
        }

        .sidebar h2{
            text-align:center;
        }

        .sidebar ul{
            list-style:none;
            padding:0;
        }

        .sidebar ul li{
            padding:15px;
            text-align:center;
        }

        .sidebar ul li a{
            color:white;
            text-decoration:none;
            display:block;
        }

        .sidebar ul li:hover{
            background-color:grey;
        }

        .content{
            margin-left:220px;
            padding:20px;
        }

        .header{
            background:lightskyblue;
            color:white;
            padding:15px;
            text-align:center;
            position:relative;
        }

        .menu-btn{
            position:absolute;
            left:10px;
            top:10px;
            font-size:20px;
            cursor:pointer;
            color:white;
        }

        #map{
            height:500px;
            width:100%;
            margin-top:20px;
        }

        @media(max-width:768px){

            .sidebar{
                width:0;
                overflow:hidden;
                transition:0.3s;
            }

            .sidebar.active{
                width:200px;
            }

            .content{
                margin-left:0;
            }
        }

    </style>
</head>

<body>

    <div class="sidebar" id="sidebar">

        <h2>APPY</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Maps.html">Maps</a></li>
            <li><a href="Hospitals.html">Hospitals</a></li>
            <li><a href="Doctor list .html">Doctor list</a></li>
            <li><a href="Emergency number.html">Emergency number</a></li>
        </ul>

    </div>

    <div class="content">

        <div class="header">
            <span class="menu-btn" onclick="toggleMenu()">☰</span>
            <h1>Map</h1>
        </div>

        <div id="map"></div>

    </div>

   
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        function toggleMenu(){
            document.getElementById("sidebar").classList.toggle("active");
        }

        // Create map
        var map = L.map('map').setView([27.6955, 85.3442], 13);

        // OpenStreetMap layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution:'© OpenStreetMap contributors'
        }).addTo(map);

        // Hospital marker
        L.marker([27.7025, 85.3303])
        .addTo(map)
        .bindPopup("Hospital")
        .openPopup();

    </script>

</body>
</html>
