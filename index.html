<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart hospitals</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
        }
        .main{
            display:flex;
        }
        .sidebar{
            width:200px;
            height:100vh;
            background-color: skyblue;
            color:white;
            padding-top:20px;
            position:fixed;
        }
        .sidebar h2{
            text-align:center;
        }
        .sidebar ul{
            list-style:none;
            padding:0;   
        }
        .sidebar ul li{
            padding:15px;
            text-align:center;  
        }
        .sidebar ul li a{
            color:white;
            text-decoration:none;
             display:block;
        }
        .sidebar ul li:hover{
            background-color:grey;   
        }
        .content{
            margin-left: 220px;
            padding:20px;
        }
        .header{
            background:lightskyblue;
            color:white;
            padding:15px;
            text-align:center;  
        }
        .menu-btn{
            position:absolute;
            left:10px;
            top:10px;
            font-size:20px;
            cursor:pointer;
            color:white;

        }
        @media(max-width:768px){
            .sidebar{
                width:0;
                overflow:hidden;
                transition:0.3s;
            }
            .sidebar.active{
                width:200px;
            }
            .content{
                margin-left:0;
            }

        }
    </style>
</head>
<body>
    
     <div class="sidebar" id="sidebar">
        <h2>APPY</h2>

    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="Maps.html">Maps</a></li>
        <li><a href="Hospitals.html">Hospitals</a></li>
        <li><a href="Doctor list .html">Doctor list</a></li>
        <li><a href="Emergency number.html">Emergeny number</a></li>
   
    </ul>
     </div>
     <div class="content">
        <div class="header">
            <span class="menu-btn" onclick="toggleMenu()">☰</span>
            <h1>Smart hospitals</h1>
        </div>
        <img src="" alt="">
     </div>
     <script>
        function toggleMenu(){
            document.getElementById("sidebar").classList.toggle("active");
        }
     </script>
</body>
</html>
